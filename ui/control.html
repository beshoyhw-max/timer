            <button id="btn-settings" class="btn btn-settings" data-i18n="btn.config">Configuration ⚙️</button>
        </div>

        <!-- ═══════ SPEAKER CONFIG ═══════ -->
        <div class="section">
            <label class="section-label" data-i18n="label.topic">Topic</label>
            <input type="text" id="input-speaker" data-i18n-placeholder="placeholder.topic" placeholder="Topic Name"
                spellcheck="false" autocomplete="off">
        </div>

        <!-- ═══════ TIME CONFIG & ADD/SUBTRACT TIME ═══════ -->
        <div class="section-row time-config-row">
            <div class="section">
                <label class="section-label" data-i18n="label.time">Time</label>
                <div class="inline-inputs">
                    <input type="number" id="input-minutes" min="0" max="120" step="any" value="5" class="narrow">
                    <span class="sep">:</span>
                    <input type="number" id="input-seconds" min="0" max="59" step="any" value="0" class="narrow">
                </div>
            </div>

            <div class="section" id="add-time-section">
                <label class="section-label" data-i18n="label.addTime">Add Time (minutes)</label>
                <div class="btn-row add-time-row">
                    <button class="btn btn-add" data-mins="5">+5</button>
                    <button class="btn btn-add" data-mins="10">+10</button>
                    <button class="btn btn-add" data-mins="20">+20</button>
                    <div class="custom-add">
                        <input type="number" id="input-custom-time" min="0.1" max="120" step="any" value="1"
                            class="narrow">
                        <button class="btn btn-add-custom" id="btn-add-custom"
                            data-i18n="btn.addCustom">+Custom</button>
                    </div>
                </div>
            </div>

            <div class="section" id="sub-time-section">
                <label class="section-label" data-i18n="label.subtractTime">Subtract Time (minutes)</label>
                <div class="btn-row add-time-row">
                    <button class="btn btn-sub" data-mins="5">−5</button>
                    <button class="btn btn-sub" data-mins="10">−10</button>
                    <button class="btn btn-sub" data-mins="20">−20</button>
                    <div class="custom-add">
                        <input type="number" id="input-custom-sub-time" min="0.1" max="120" step="any" value="1"
                            class="narrow">
                        <button class="btn btn-sub-custom" id="btn-sub-custom"
                            data-i18n="btn.subCustom">−Custom</button>
                    </div>
                </div>
            </div>
        </div>


        <!-- ═══════ MAIN ACTIONS ═══════ -->
        <div class="btn-row main-actions">
            <button id="btn-start" class="btn btn-start" data-i18n="btn.start">▶ START</button>
            <button id="btn-pause" class="btn btn-pause" disabled data-i18n="btn.pause">⏸ PAUSE</button>
            <button id="btn-stop" class="btn btn-stop" disabled data-i18n="btn.stop">■ STOP</button>
            <button id="btn-next" class="btn btn-next" disabled data-i18n="btn.next">⏭ NEXT</button>
        </div>

        <hr class="divider">

        <!-- ═══════ QUOTE CONFIG ═══════ -->
        <div class="section">
            <label class="section-label" data-i18n="label.quote">Quote (shown during animations)</label>
            <input type="text" id="input-quote" data-i18n-placeholder="placeholder.quote"
                placeholder="Enter a motivational quote..." spellcheck="false" autocomplete="off">
        </div>

        <hr class="divider">

        <!-- ═══════ SPEAKER LIST ═══════ -->
        <div class="section">
            <label class="section-label" data-i18n="label.topicList">Topic List</label>
            <div class="btn-row" style="margin-top: 6px;">
                <button class="btn btn-sm" id="btn-add-speaker" data-i18n="btn.addTopic">+ Add Topic</button>
                <button class="btn btn-sm btn-import-excel" id="btn-import-excel" data-i18n="btn.importExcel">📂 Import
                    Excel</button>
                <button class="btn btn-sm" id="btn-generate-template" data-i18n="btn.generateTemplate">📋 Generate
                    Template</button>
                <button class="btn btn-sm btn-load-next" id="btn-load-next" data-i18n="btn.loadNext">⏭ Load
                    Next</button>
                <button class="btn btn-sm" id="btn-unlink" title="Edit manually without changing list"
                    data-i18n="btn.unlink">🔓 Unlink</button>
                <button class="btn btn-sm" id="btn-restart-list" title="Start over from first speaker"
                    data-i18n="btn.restart">⟲ Restart</button>
            </div>
            <div id="speakers-container">
                <!-- Speaker rows dynamically rendered -->
            </div>
        </div>

        <!-- ═══════ ADD TIME ═══════ -->


        <div class="btn-row hidden">
            <button class="btn btn-save" id="btn-save-config">💾 Save Config</button>
        </div>


        <!-- ═══════ HISTORY ═══════ -->
        <div id="history-section" class="section hidden">
            <div class="section-header">
                <label class="section-label" data-i18n="label.history">History</label>
                <button id="btn-export" class="btn btn-sm" data-i18n="btn.export">📥 Export</button>
            </div>
            <div id="history-list"></div>
        </div>

        <!-- ═══════ COPYRIGHT ═══════ -->
        <div class="copyright-footer">
            <span data-i18n="label.copyright">© 2026 Northern Africa IT Business Service Dept. All Rights
                Reserved.</span>
        </div>
    </div><!-- end #control-app -->

    <!-- ═══════ LIVE MODE OVERLAY ═══════ -->
    <div id="live-mode" class="hidden">
        <!-- Row 1: Info Bar -->
        <div class="lm-row lm-info">
            <span id="lm-phase-dot" class="lm-dot idle"></span>
            <span id="lm-topic" class="lm-topic">—</span>
            <span id="lm-clock" class="lm-clock mono">00:00</span>
            <div class="lm-addtime-wrap">
                <button id="lm-btn-addtime" class="lm-btn lm-btn-addtime" data-i18n-title="title.addTime"
                    title="Add Time">+⏱</button>
                <div id="lm-addtime-dropdown" class="lm-dropdown hidden">
                    <button class="lm-dd-item" data-secs="60" data-i18n="lm.add1m">+1 min</button>
                    <button class="lm-dd-item" data-secs="300" data-i18n="lm.add5m">+5 min</button>
                    <button class="lm-dd-item" data-secs="600" data-i18n="lm.add10m">+10 min</button>
                    <button class="lm-dd-item" data-secs="1200" data-i18n="lm.add20m">+20 min</button>
                </div>
            </div>
            <div class="lm-subtime-wrap">
                <button id="lm-btn-subtime" class="lm-btn lm-btn-subtime" data-i18n-title="title.subTime"
                    title="Subtract Time">−⏱</button>
                <div id="lm-subtime-dropdown" class="lm-dropdown hidden">
                    <button class="lm-dd-item" data-sub-secs="60" data-i18n="lm.sub1m">−1 min</button>
                    <button class="lm-dd-item" data-sub-secs="300" data-i18n="lm.sub5m">−5 min</button>
                    <button class="lm-dd-item" data-sub-secs="600" data-i18n="lm.sub10m">−10 min</button>
                    <button class="lm-dd-item" data-sub-secs="1200" data-i18n="lm.sub20m">−20 min</button>
                </div>
            </div>
            <button id="lm-btn-alarm" class="lm-btn lm-btn-alarm" data-i18n-title="title.toggleAlarms"
                title="Toggle Alarms">🔔</button>
            <button id="lm-btn-exit" class="lm-btn lm-btn-exit" data-i18n-title="title.exitLiveMode"
                title="Exit Live Mode">⛶</button>
        </div>
        <!-- Row 2: Transport Controls -->
        <div class="lm-row lm-controls">
            <button id="lm-btn-prev" class="lm-btn lm-btn-prev" data-i18n="btn.lmPrev">⏮ Prev</button>
            <button id="lm-btn-start" class="lm-btn lm-btn-start" data-i18n="btn.lmStart">▶ Start</button>
            <button id="lm-btn-pause" class="lm-btn lm-btn-pause hidden" data-i18n="btn.lmPause">⏸ Pause</button>
            <button id="lm-btn-stop" class="lm-btn lm-btn-stop" disabled data-i18n="btn.lmStop">■ Stop</button>
            <button id="lm-btn-next" class="lm-btn lm-btn-next" data-i18n="btn.lmNext">⏭ Next</button>
        </div>
        <!-- Row 3: Up Next Section -->
        <div class="lm-upnext-section">
            <div class="lm-upnext-header">
                <span class="lm-queue-label" data-i18n="label.upNext">UP NEXT</span>
                <button id="lm-btn-expand" class="lm-btn lm-btn-expand" data-i18n-title="title.showMore"
                    title="Show more">▾</button>
            </div>
            <div id="lm-queue-preview" class="lm-queue-preview"></div>
            <div id="lm-queue-expanded" class="lm-queue-expanded hidden"></div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/control_panel.js"></script>
</body>

</html>
